# Base conda skeleton for sam2_app.
# Pair this with trainer/requirements-sam2.txt for the pip-installed packages validated on the current dev machine.
name: sam2_app
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch=2.5.*
  - torchvision=0.20.*
  - pytorch-cuda=11.8
  - pip:
      - git+https://github.com/facebookresearch/sam2.git
      - huggingface_hub
      - pillow
      - numpy
